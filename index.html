<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>දේශීය වෛද්‍ය පීඨය | කොළඹ විශ්ව විද්‍යාලය</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Noto+Sans+Sinhala:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #030303;
            --bg-card: #ff0033;
            --text-main: #00ff66;
            --text-sub: #64748b;
            --primary: #1c29e8;
            --accent: #d4af37;
            --nav-bg: rgba(255, 255, 255, 0.98);
            --border: #e2e8f0;
            --hero-grad: linear-gradient(135deg, #1e5128 0%, #064e3b 100%);
        }

        [data-theme="dark"] {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f1f5f9;
            --text-sub: #94a3b8;
            --primary: #4e944f;
            --accent: #fbbf24;
            --nav-bg: #1e293b;
            --border: #334155;
        }
        
* { 
    margin: 0; 
    padding: 0; 
    box-sizing: border-box; 
    transition: background 0.3s, color 0.3s; 
}

body {  
    font-family: 'Inter', 'Noto Sans Sinhala', sans-serif;  
    background-color: var(--bg-body);  
    color: var(--text-main);  
    line-height: 1.7;
    scroll-behavior: smooth;
    overflow-x: hidden;
}
