<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>දේශීය වෛද්‍ය පීඨය | කොළඹ විශ්ව විද්‍යාලය</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Noto+Sans+Sinhala:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #030303;
            --bg-card: #ff0033;
            --text-main: #00ff66;
            --text-sub: #64748b;
            --primary: #1c29e8;
            --accent: #d4af37;
            --nav-bg: rgba(255, 255, 255, 0.98);
            --border: #e2e8f0;
            --hero-grad: linear-gradient(135deg, #1e5128 0%, #064e3b 100%);
        }

        [data-theme="dark"] {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f1f5f9;
            --text-sub: #94a3b8;
            --primary: #4e944f;
            --accent: #fbbf24;
            --nav-bg: #1e293b;
            --border: #334155;
        }
        
* { 
    margin: 0; 
    padding: 0; 
    box-sizing: border-box; 
    transition: background 0.3s, color 0.3s; 
}

body {  
    font-family: 'Inter', 'Noto Sans Sinhala', sans-serif;  
    background-color: var(--bg-body);  
    color: var(--text-main);  
    line-height: 1.7;
    scroll-behavior: smooth;
    overflow-x: hidden;
}

        
* { 
    margin: 0; 
    padding: 0; 
    box-sizing: border-box; 
    transition: background 0.3s, color 0.3s; 
}

body {  
    font-family: 'Inter', 'Noto Sans Sinhala', sans-serif;  
    background-color: var(--bg-body);  
    color: var(--text-main);  
    line-height: 1.7;
    scroll-behavior: smooth;
    overflow-x: hidden;
}       


     /* Navigation */
        nav {
            position: fixed; top: 0; width: 100%;
            background: var(--nav-bg);
            backdrop-filter: blur(12px);
            padding: 15px 5%;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 2500; border-bottom: 1px solid var(--border);
        }
        .logo { font-weight: 700; font-size: 1.2rem; color: var(--primary); z-index: 3000; }

        .nav-links { display: flex; gap: 30px; align-items: center; }
        .nav-links a { text-decoration: none; color: var(--text-main); font-weight: 600; font-size: 0.9rem; transition: 0.2s; }
        .nav-links a:hover { color: var(--accent); }


 .hamburger { display: none; cursor: pointer; flex-direction: column; gap: 6px; z-index: 3000; padding: 5px; }
        .hamburger span { width: 30px; height: 3px; background: var(--primary); border-radius: 5px; transition: 0.4s ease-in-out; }

        /* Animation for Hamburger X */
        .hamburger.active span:nth-child(1) { transform: translateY(9px) rotate(45deg); }
        .hamburger.active span:nth-child(2) { opacity: 0; }
        .hamburger.active span:nth-child(3) { transform: translateY(-9px) rotate(-45deg); }



    
   /* Hero */
        .hero {
            padding: 160px 20px 100px;
            background: var(--hero-grad);
            color: white; text-align: center;
            clip-path: polygon(0 0, 100% 0, 100% 90%, 0% 100%);
        }
        .hero h1 { font-size: clamp(1.6rem, 5vw, 2.8rem); margin-bottom: 15px; font-weight: 700; }



        .container { max-width: 1140px; margin: 0 auto; padding: 40px 20px; }

        /* Cards & Grids */
        .mv-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; margin-top: -80px; }
        .mv-card { background: var(--bg-card); padding: 35px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border-bottom: 4px solid var(--accent); }
